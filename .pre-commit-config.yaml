repos:
  # General house-keeping hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        always_run: true
      - id: end-of-file-fixer
        always_run: true
      - id: check-yaml
        always_run: true
        args: ['--unsafe'] # required for some custom yaml tags
      - id: detect-private-key
        always_run: true

  # Shift-Left Secret Scanning
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        always_run: true

  # Shift-Left SAST for Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        always_run: true
        args: ["-r", "backend/"] # Scan the Python backend code
        pass_filenames: false
        additional_dependencies: ['pbr']

  # Shift-Left IaC Scanning for Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.86.0
    hooks:
      - id: terraform_fmt
        always_run: true
      - id: terraform_tfsec
        always_run: true
