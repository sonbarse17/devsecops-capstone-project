name: Tool - Trivy IaC

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Run Trivy IaC scan (SARIF report)
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            config . \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output reports/trivy-iac.sarif

      - name: Run Trivy IaC scan (JSON report)
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            config . \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output reports/trivy-iac.json

      - name: Upload Trivy IaC reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-reports
          path: reports
          if-no-files-found: ignore

      - name: Upload Trivy IaC SARIF to GitHub Security
        if: ${{ always() && hashFiles('reports/trivy-iac.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/trivy-iac.sarif

      - name: Enforce Trivy IaC gate
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            config . \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table
