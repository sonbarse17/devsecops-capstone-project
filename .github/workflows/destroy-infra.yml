name: Destroy Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target cloud to destroy"
        required: true
        default: "aws"
        type: choice
        options:
          - aws
          - azure
          - both

env:
  TF_VERSION: "1.5.0"

jobs:
  destroy-aws:
    if: ${{ github.event.inputs.target == 'aws' || github.event.inputs.target == 'both' }}
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Terraform Init (AWS)
        working-directory: infra/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET || 'devsecops-terraform-state-bucket' }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY || 'aws/terraform.tfstate' }}" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Terraform Destroy (AWS)
        working-directory: infra/aws
        run: terraform destroy -auto-approve
        env:
          TF_VAR_eks_cluster_name: ${{ vars.EKS_CLUSTER_NAME || 'insecure-cluster' }}
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

  destroy-azure:
    if: ${{ github.event.inputs.target == 'azure' || github.event.inputs.target == 'both' }}
    name: Destroy Azure Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init (Azure)
        working-directory: infra/azure
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Destroy (Azure)
        working-directory: infra/azure
        run: terraform destroy -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
