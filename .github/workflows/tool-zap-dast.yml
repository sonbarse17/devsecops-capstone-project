name: Tool - OWASP ZAP DAST

on:
  workflow_call:

jobs:
  analyze-dast:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Application Stack (Docker Compose)
        run: |
          docker compose up -d
          until curl -s http://localhost:8080 > /dev/null; do
            echo "Waiting for frontend to start..."
            sleep 5
          done

      - name: Grant ZAP write permissions to workspace
        run: sudo chmod -R 777 "$GITHUB_WORKSPACE"

      - name: Prepare report directory
        run: mkdir -p reports

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8080"
          fail_action: true
          cmd_options: "-a -J reports/zap-report.json -r reports/zap-report.html -w reports/zap-report.md"
          allow_issue_writing: false

      - name: Upload ZAP reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-reports
          path: reports
          if-no-files-found: warn

      - name: Stop Application Stack
        if: ${{ always() }}
        run: docker compose down -v
