name: DevSecOps CI Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: 1. CodeQL
    uses: ./.github/workflows/tool-codeql.yml
    secrets: inherit

  dependency-audit:
    name: 2. Dependency Audit
    needs: codeql
    uses: ./.github/workflows/tool-dependency-audit.yml
    secrets: inherit

  sonarqube:
    name: 3. SonarQube
    needs: dependency-audit
    uses: ./.github/workflows/tool-sonarqube.yml
    secrets: inherit

  dependency-check:
    name: 4. Dependency-Check
    needs: sonarqube
    uses: ./.github/workflows/tool-dependency-check.yml
    secrets: inherit

  trivy-iac:
    name: 5. Trivy IaC
    needs: dependency-check
    uses: ./.github/workflows/tool-trivy-iac.yml
    secrets: inherit

  trivy-container:
    name: 6. Trivy Container
    needs: trivy-iac
    uses: ./.github/workflows/tool-trivy-container.yml
    secrets: inherit

  zap-dast:
    name: 7. OWASP ZAP DAST
    needs: trivy-container
    uses: ./.github/workflows/tool-zap-dast.yml
    secrets: inherit
