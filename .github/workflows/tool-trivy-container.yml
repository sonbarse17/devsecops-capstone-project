name: Tool - Trivy Container

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-container:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Build an image from Frontend Dockerfile
        run: docker build -t sonbarse17/frontend:${{ github.sha }} ./frontend

      - name: Build an image from Backend Dockerfile
        run: docker build -t sonbarse17/backend:${{ github.sha }} ./backend

      - name: Run Trivy scanner on Frontend image (SARIF report)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/frontend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output reports/trivy-frontend.sarif

      - name: Run Trivy scanner on Frontend image (JSON report)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/frontend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output reports/trivy-frontend.json

      - name: Run Trivy scanner on Backend image (SARIF report)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/backend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format sarif \
            --output reports/trivy-backend.sarif

      - name: Run Trivy scanner on Backend image (JSON report)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/backend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output reports/trivy-backend.json

      - name: Upload Trivy container reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-container-reports
          path: reports
          if-no-files-found: ignore

      - name: Upload Frontend Trivy SARIF to GitHub Security
        if: ${{ always() && hashFiles('reports/trivy-frontend.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/trivy-frontend.sarif

      - name: Upload Backend Trivy SARIF to GitHub Security
        if: ${{ always() && hashFiles('reports/trivy-backend.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/trivy-backend.sarif

      - name: Enforce Trivy frontend gate
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/frontend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table

      - name: Enforce Trivy backend gate
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image sonbarse17/backend:${{ github.sha }} \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table
