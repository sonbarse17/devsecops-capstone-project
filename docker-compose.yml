services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret}
      - DB_NAME=insecure_db
    depends_on:
      - database

  database:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-supersecret}
      - MYSQL_DATABASE=insecure_db
    ports:
      - "3306:3306"
