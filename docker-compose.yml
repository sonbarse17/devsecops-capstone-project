services:
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret}
      - DB_NAME=insecure_db
    depends_on:
      - database

  database:
    # Secure: Upgrade to modern MySQL version (mysql:8.0)
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-supersecret}
      - MYSQL_DATABASE=insecure_db
    ports:
      - "3306:3306"
