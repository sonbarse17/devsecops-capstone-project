# -------------------------------------------------------------
# Default Deny Network Policy
# -------------------------------------------------------------
# in the namespace by default, establishing a ZERO TRUST boundary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {} # Selects all pods in the namespace
  policyTypes:
  - Ingress
  - Egress
---
# -------------------------------------------------------------
# Explicit Allow: Frontend
# -------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {} # Allow all inbound traffic to frontend (from Internet / Ingress Controller)
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 53 # CoreDNS lookup
---
# -------------------------------------------------------------
# Explicit Allow: Backend
# -------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: database
    ports:
    - protocol: TCP
      port: 3306
  - ports:
    - protocol: TCP
      port: 53 # CoreDNS
  # We might need to allow egress to 443 depending on the SSRF endpoint tests
  - ports:
    - protocol: TCP
      port: 443
---
# -------------------------------------------------------------
# Explicit Allow: Database
# -------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database
spec:
  podSelector:
    matchLabels:
      app: database
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 3306
